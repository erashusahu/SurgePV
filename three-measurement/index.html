<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Three.js 3D Measurement Tool — click two points to measure distances in a 3D scene" />
  <title>3D Measurement Tool</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📏</text></svg>" />
</head>

<body>
  <div id="app"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <h1>📐 3D Measure</h1>
    <div class="divider"></div>
    <button id="measure-btn" class="btn" aria-label="Toggle measurement mode">📏 Measure</button>
    <button id="clear-btn" class="btn btn-danger" aria-label="Clear all measurements">🗑 Clear All</button>
    <div class="divider"></div>

    <!-- Add Figure Dropdown -->
    <div class="dropdown">
      <button class="btn btn-add" aria-haspopup="true" aria-expanded="false">➕ Add Figure ▾</button>
      <div class="dropdown-menu">
        <button id="add-box" class="dropdown-item">📦 Box</button>
        <button id="add-sphere" class="dropdown-item">⚽ Sphere</button>
        <button id="add-cylinder" class="dropdown-item">🛢 Cylinder</button>
        <button id="add-cone" class="dropdown-item">🔺 Cone</button>
        <button id="add-torus" class="dropdown-item">🍩 Torus</button>
      </div>
    </div>

    <button id="remove-shape-btn" class="btn btn-danger" aria-label="Toggle remove shape mode" style="margin-left: 8px;">🗑 Remove Shape</button>
    <button id="move-shape-btn" class="btn" aria-label="Toggle move shape mode" style="margin-left: 8px;">🤚 Move Shape</button>
    <button id="undo-shape-btn" class="btn" aria-label="Undo last shape removal" style="margin-left: 8px;" disabled>↩ Undo</button>
  </div>

  <!-- Info Badges (top-right) -->
  <div class="info-badges-container">
    <div class="info-badge">
      <span class="label">Measurements</span>
      <span class="value" id="count">0</span>
    </div>
    <div class="info-badge unit-badge" id="unit-badge">
      <span class="label">Unit</span>
      <button id="unit-dropdown-toggle" class="unit-toggle" aria-haspopup="true" aria-expanded="false" aria-label="Change measurement unit">
        <div class="unit-toggle-text">
          <span id="unit-display" class="unit-code">M</span>
          <small id="unit-label">Meters</small>
        </div>
        <span class="caret">▾</span>
      </button>
      <div id="unit-dropdown-menu" class="unit-dropdown-menu"></div>
    </div>
  </div>

  <!-- Selection Info -->
  <div id="selection-info" class="selection-panel" style="display:none;">
    <span class="selection-title">✏️ Selected</span>
    <span class="key-hint"><kbd>E</kbd> Erase</span>
    <span class="key-hint"><kbd>M</kbd> Change Unit</span>
    <span class="key-hint"><kbd>ESC</kbd> Deselect</span>
  </div>

  <!-- Measurement Records Table (right side) -->
  <div id="records-panel" class="records-panel">
    <div class="records-header">
      <span class="records-title">Measurement Records</span>
      <span id="records-count" class="records-count">0</span>
    </div>
    <div class="records-table-wrap">
      <table class="records-table">
        <thead>
          <tr>
            <th>#</th>
            <th>From</th>
            <th>To</th>
            <th>Distance</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="records-body">
        </tbody>
      </table>
      <div id="records-empty" class="records-empty">No measurements yet</div>
    </div>
  </div>

  <!-- Keyboard Shortcuts (bottom-left) -->
  <div class="shortcuts-panel">
    <div class="shortcut-title">Shortcuts</div>
    <div class="shortcut-row"><kbd>E</kbd> Erase selected</div>
    <div class="shortcut-row"><kbd>M</kbd> Unit (selected)</div>
    <div class="shortcut-row"><kbd>C</kbd> Unit (all)</div>
    <div class="shortcut-row"><kbd>Ctrl+Z</kbd> Undo deletion</div>
    <div class="shortcut-row"><kbd>ESC</kbd> Cancel / Deselect</div>
  </div>

  <!-- Status Bar -->
  <div class="status-panel" aria-live="polite">
    <span id="status" class="status-badge inactive">Inactive</span>
    <span id="instruction" class="instruction-text">Click "Measure" to start</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
